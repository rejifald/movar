name: Version

# Changesets "Version Packages" PR bot.
#
# When a push to main changes the pending changesets (i.e. a PR carrying a
# `.changeset/*.md` just merged), this opens — or updates — a single
# `chore: version packages` PR that runs `pnpm version:packages`
# (`changeset version` + prettier). That consumes every pending changeset,
# bumps the affected package versions, and writes each package's CHANGELOG.md.
#
# Nothing is published here. Merging the version PR just lands the version bump
# + changelog on main. Cutting the actual store release stays a deliberate human
# step: publish a GitHub Release tagged `extension-v<version>` (matching the
# freshly-bumped `apps/extension/package.json`), which triggers
# .github/workflows/release.yml — and every store job there still parks on the
# manual `production` environment approval.
#
# No changesets pending → the action is a no-op. When the version PR itself
# merges, the changesets are already consumed, so this run finds nothing and
# does nothing — no loop.
#
# TOKEN — read before relying on the version PR's CI: a PR opened with the
# built-in GITHUB_TOKEN does NOT trigger `on: pull_request` workflows (GitHub's
# anti-recursion rule), so CI + the metrics-gate would never run on the version
# PR and it could never satisfy the main ruleset's required checks. To let the
# version PR run CI, add a repo secret `CHANGESETS_TOKEN` — a fine-grained PAT or
# GitHub App token with `contents: write` + `pull-requests: write`. Until then
# this falls back to GITHUB_TOKEN (the PR opens, but you must re-trigger its
# checks by hand — e.g. close/reopen — before merging). See
# docs/release-credentials.md § Changesets version PR.

on:
  push:
    branches: [main]
    # Only react when the set of pending changesets actually changes; a normal
    # feature push with no `.changeset/` delta leaves any open version PR as-is.
    paths: ['.changeset/**']

# One version PR at a time; a newer main push supersedes an in-flight run.
concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # changesets' changelog generator walks git history for commit refs.
          fetch-depth: 0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # Consume pending changesets: bump versions + write CHANGELOG.md, then
          # prettier-format the result so the PR is `format:check`-clean. No
          # `publish:` input — releasing is the manual GitHub Release above.
          version: pnpm version:packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN || github.token }}
          # `pnpm install` above ran `prepare` → `lefthook install`, which wires
          # the local pre-push hook (build + metrics + e2e-fast). Without this,
          # the action's automated `git push` of `changeset-release/main` fires
          # that hook inside the runner — e2e-fast has no browser/build setup
          # here, fails, and the push dies with "failed to push some refs", so
          # the version PR never opens. The pre-push hook is a developer guard;
          # main is already protected by the required ci-gate + metrics-gate
          # checks. LEFTHOOK=0 makes the installed hook `exit 0` immediately.
          LEFTHOOK: '0'
