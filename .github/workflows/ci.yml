name: CI

on:
  push:
    branches: [main]
  pull_request:
  # The `regenerate-baselines` workflow re-triggers CI via this trigger
  # after pushing fresh `*-linux.png` baselines back onto the dispatched
  # ref. Without this, the bot's push wouldn't produce a green check
  # (GitHub deliberately skips workflow runs for pushes made with
  # GITHUB_TOKEN, to avoid infinite loops).
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  metrics:
    runs-on: ubuntu-latest
    needs: verify
    # Only PRs — pushes to main re-baseline implicitly when verify passes.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Audit the PR diff against main — fail if new dead code, complexity,
      # or duplication is introduced. Fallow exits non-zero on regressions.
      - run: pnpm metrics:audit
      - name: Generate metrics snapshot
        if: always()
        run: pnpm metrics
      - name: Upload metrics report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fallow-metrics
          path: |
            .metrics/
            docs/REFACTORING-QUEUE.md

  # Per-browser side-loadable zips for PR testers. The release workflow
  # ships the chrome zip to both Chrome Web Store and Edge Add-ons, so
  # the chrome leg's artifact is labeled `movar-chrome-edge` to signal
  # that one download covers both targets. Safari builds the unpacked
  # extension; full Safari verification still requires the Xcode wrapper.
  build:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            script: zip
            artifact: movar-chrome-edge
          - browser: firefox
            script: zip:firefox
            artifact: movar-firefox
          - browser: safari
            script: zip:safari
            artifact: movar-safari
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @movar/extension ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/extension/.output/movarextension-*-${{ matrix.browser }}.zip
          if-no-files-found: error
          # `.output/` starts with a dot, so upload-artifact treats it as
          # a hidden path and skips it by default. Opt in explicitly.
          include-hidden-files: true

  # Offline e2e suite — the comprehensive CI gate for the extension's
  # rendered surfaces and content-script behaviour. Runs in parallel with
  # `verify` (lint failures should surface independently of e2e failures,
  # and vice versa) and `build` (the Nx `dependsOn: extension:build`
  # builds chrome-mv3 here transparently, so the matrix build doesn't
  # need to feed this job).
  #
  # Coverage: popup structural + visual, options structural + visual,
  # both surfaces' behavior (click → chrome.storage round-trip), and
  # content-script behaviour against mocked HTML fixtures. The live-site
  # suite (`apps/e2e/playwright.live.config.ts`) is manual-only and is
  # not invoked here; CI runs the default deterministic config exclusively.
  #
  # Why Xvfb: Playwright must run headed to load MV3 extensions
  # (`chromium.launchPersistentContext` is the only path that accepts an
  # `--load-extension` arg), and headed Chromium on Linux needs a display
  # server. `xvfb-run -a` allocates a disposable :99 display per
  # invocation.
  #
  # Baselines: visual baselines live at
  # `apps/e2e/src/offline/{popup,options}.visual.spec.ts-snapshots/`. Both
  # `*-darwin.png` (macOS local dev) and `*-linux.png` (this job) are
  # committed; refresh the Linux set via the `regenerate-baselines`
  # workflow.
  e2e-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Playwright's browser binaries are pinned to the package version,
      # which is in turn pinned in pnpm-lock.yaml. Keying the cache on the
      # lockfile hash means a Playwright bump auto-invalidates without a
      # manual key bump.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @movar/e2e exec playwright install --with-deps chromium

      # `dependsOn: [{ projects: ['extension'], target: 'build' }]` in
      # `apps/e2e/project.json` builds the extension (chrome-mv3 by
      # default — matches the fixture's `EXTENSION_PATH`) before the
      # offline tests run.
      - name: Run offline suite
        run: xvfb-run -a pnpm nx run e2e:test

      # The HTML report contains actual/expected/diff PNGs for every
      # visual failure — the only diagnostic that matters in triage.
      # Keep the raw test-results too: traces, videos, attachments.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/e2e/playwright-report/
            apps/e2e/test-results/
          retention-days: 14
          if-no-files-found: ignore

  # Full pre-submission suite — same script run locally before any store
  # upload. Catches what the `verify` job misses: publint failures,
  # extension zip not actually produced, zip contents leaking sourcemaps
  # or other dev cruft. Duplicates some typecheck/lint/test work from
  # `verify`; the trade-off is one source of truth for what "ready to
  # publish" means.
  verify-release:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:release
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extension-zips
          path: apps/extension/.output/*.zip
          retention-days: 14
          if-no-files-found: ignore
