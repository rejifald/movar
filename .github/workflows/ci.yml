name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm check:readme
      - run: pnpm check:suppressions
      # Governance config-as-code parity: metrics-gate bypass is empty (JSON +
      # doc agree) and every release store job gates on an environment.
      - run: pnpm check:release-governance
      # Supply-chain: every `uses:` across .github/workflows is pinned to a
      # 40-char commit SHA, not a mutable tag. Self-consistent — this step
      # itself runs on a SHA-pinned actions/checkout above.
      - run: pnpm check:action-pins
      # franc-free + size content-bundle guard (precise esbuild source-graph
      # check + per-package contributor readout). Belt-and-braces with the
      # always-run real-artifact franc/size guard in wxt.config.ts build:done.
      - run: pnpm --filter @movar/extension check:content-bundle

  # The former `metrics` job (PR-only `pnpm metrics:audit`) now lives in
  # `metrics-gate.yml`, which folds that same `fallow audit` into a broader,
  # acknowledgeable gate that also covers coverage regressions and snapshot
  # freshness. Kept out of this file so the override label can re-run the gate
  # (via `labeled` events) without re-triggering the heavy build/e2e jobs below.

  # Per-browser unpacked extensions for PR testers. We upload the wxt
  # output directory (not the wxt zip), so the GitHub-wrapped artifact
  # download extracts straight to `manifest.json` + the rest at the
  # root — no nested zip to confuse anyone. Chrome/Edge: "Load unpacked"
  # on the extracted folder. Firefox: `about:debugging` → "Load Temporary
  # Add-on…" → pick `manifest.json`. The release workflow ships the
  # chrome zip to both Chrome Web Store and Edge Add-ons (built from the
  # same `chrome-mv3/` output), so the chrome leg's artifact is labeled
  # `movar-chrome-edge`. Safari builds the unpacked extension; actually
  # installing in Safari still needs the Xcode wrapper.
  #
  # No `needs: verify`: the build runs in parallel with `verify` (and
  # `e2e-offline`) so a lint/type failure and a build failure surface
  # independently. One job builds all three browsers sequentially and uploads
  # the three unpacked artifacts — a single `pnpm install` instead of three and
  # three fewer runner slots than the old per-browser matrix, and it stays one
  # check line on a PR instead of three. Sequential builds still finish within
  # the `e2e-offline` critical path, so the PR wall-clock is unchanged.
  # `ci-gate` (below) aggregates this into the single required check.
  #
  # Trade-off vs the old `fail-fast: false` matrix: a broken chrome build stops
  # the job before firefox/safari build, so you see the first failure rather
  # than all three at once. Uploads are interleaved after each build, so an
  # earlier browser's artifact still survives a later browser's build failure.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # chrome-mv3 is also the artifact shipped to CWS + Edge (built from the
      # same output), hence the `movar-chrome-edge` label.
      - run: pnpm --filter @movar/extension build:chrome
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: movar-chrome-edge
          path: apps/extension/.output/chrome-mv3/
          if-no-files-found: error
          # `.output/` starts with a dot, so upload-artifact treats it as a
          # hidden path and skips it by default. Opt in explicitly.
          include-hidden-files: true

      - run: pnpm --filter @movar/extension build:firefox
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: movar-firefox
          path: apps/extension/.output/firefox-mv3/
          if-no-files-found: error
          include-hidden-files: true

      - run: pnpm --filter @movar/extension build:safari
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: movar-safari
          path: apps/extension/.output/safari-mv3/
          if-no-files-found: error
          include-hidden-files: true

  # Offline e2e + visual suite — the comprehensive gate for the extension's
  # rendered surfaces, and the ONLY pixel coverage in the pipeline. Runs on
  # every PR and every push to main. The suite (and the rationale for the
  # pinned Playwright container, Xvfb, and the committed Linux baselines) lives
  # in the reusable `e2e.yml`, which `release.yml` reuses as its pre-submission
  # visual gate — one definition, both sides of the merge.
  e2e-offline:
    uses: ./.github/workflows/e2e.yml

  # The single required status check (see
  # `.github/rulesets/main-metrics-gate.json`). Aggregating the PR-gating jobs
  # here means branch protection references ONE stable context: add, rename, or
  # split a job and only this `needs:` list changes — the ruleset never has to.
  # Runs even when a dependency fails or is skipped (`if: always()`) and fails
  # iff any listed job failed or was cancelled. Skipped jobs are treated as
  # non-blocking. The full pre-submission suite (`pnpm verify:release`) is NOT a
  # dependency: it runs post-merge in its own `verify-release.yml` on pushes to
  # main, so it never shows up as a PR check at all.
  ci-gate:
    if: always()
    needs: [verify, build, e2e-offline]
    runs-on: ubuntu-latest
    steps:
      - name: Require every gating job to have passed
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "dependency results: $results"
          case "$results" in
            *failure* | *cancelled*)
              echo "::error::a required CI job failed or was cancelled ($results)"
              exit 1
              ;;
          esac
          echo "all required CI jobs passed (skipped jobs are non-blocking)"
