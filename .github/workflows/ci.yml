name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  metrics:
    runs-on: ubuntu-latest
    needs: verify
    # Only PRs — pushes to main re-baseline implicitly when verify passes.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Audit the PR diff against main — fail if new dead code, complexity,
      # or duplication is introduced. Fallow exits non-zero on regressions.
      - run: pnpm metrics:audit
      - name: Generate metrics snapshot
        if: always()
        run: pnpm metrics
      - name: Upload metrics report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fallow-metrics
          path: |
            .metrics/
            docs/REFACTORING-QUEUE.md

  build:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run extension:build -- --browser=${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        with:
          name: movar-${{ matrix.browser }}
          path: apps/extension/.output/
