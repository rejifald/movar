name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm check:readme
      - run: pnpm check:suppressions
      # Governance config-as-code parity: metrics-gate bypass is empty (JSON +
      # doc agree) and every release store job gates on an environment.
      - run: pnpm check:release-governance
      # Supply-chain: every `uses:` across .github/workflows is pinned to a
      # 40-char commit SHA, not a mutable tag. Self-consistent — this step
      # itself runs on a SHA-pinned actions/checkout above.
      - run: pnpm check:action-pins
      # franc-free + size content-bundle guard (precise esbuild source-graph
      # check + per-package contributor readout). Belt-and-braces with the
      # always-run real-artifact franc/size guard in wxt.config.ts build:done.
      - run: pnpm --filter @movar/extension check:content-bundle

  # The former `metrics` job (PR-only `pnpm metrics:audit`) now lives in
  # `metrics-gate.yml`, which folds that same `fallow audit` into a broader,
  # acknowledgeable gate that also covers coverage regressions and snapshot
  # freshness. Kept out of this file so the override label can re-run the gate
  # (via `labeled` events) without re-triggering the heavy build/e2e jobs below.

  # Per-browser unpacked extensions for PR testers. We upload the wxt
  # output directory (not the wxt zip), so the GitHub-wrapped artifact
  # download extracts straight to `manifest.json` + the rest at the
  # root — no nested zip to confuse anyone. Chrome/Edge: "Load unpacked"
  # on the extracted folder. Firefox: `about:debugging` → "Load Temporary
  # Add-on…" → pick `manifest.json`. The release workflow ships the
  # chrome zip to both Chrome Web Store and Edge Add-ons (built from the
  # same `chrome-mv3/` output), so the chrome leg's artifact is labeled
  # `movar-chrome-edge`. Safari builds the unpacked extension; actually
  # installing in Safari still needs the Xcode wrapper.
  build:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            script: build:chrome
            output: chrome-mv3
            artifact: movar-chrome-edge
          - browser: firefox
            script: build:firefox
            output: firefox-mv3
            artifact: movar-firefox
          - browser: safari
            script: build:safari
            output: safari-mv3
            artifact: movar-safari
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @movar/extension ${{ matrix.script }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: apps/extension/.output/${{ matrix.output }}/
          if-no-files-found: error
          # `.output/` starts with a dot, so upload-artifact treats it
          # as a hidden path and skips it by default. Opt in explicitly.
          include-hidden-files: true

  # Offline e2e suite — the comprehensive CI gate for the extension's
  # rendered surfaces and content-script behaviour. Runs in parallel with
  # `verify` (lint failures should surface independently of e2e failures,
  # and vice versa) and `build` (the Nx `dependsOn: extension:build:e2e`
  # builds chrome-mv3 here transparently, so the matrix build doesn't
  # need to feed this job). `build:e2e` (not the plain `build` the matrix/
  # zip jobs use) sets `MOVAR_E2E=1`, keeping `<all_urls>` a required host
  # permission for this build only — the fixture has no
  # `permissions.request()` grant step, and the published extension gets
  # the real optional-permission treatment instead (see wxt.config.ts).
  #
  # Coverage: popup + options (structural + visual + behavior click →
  # chrome.storage round-trip), onboarding + crash + curtain visuals, the
  # Safari host app (Detector/Settings/About × iOS+macOS visuals), the
  # diagnostics panel (harness visuals), and content-script behaviour against
  # mocked HTML fixtures — plus, in the separate `Run marketing visual suite`
  # step, the Astro marketing site. The live-site suite
  # (`apps/e2e/playwright.live.config.ts`) is manual-only and is not invoked
  # here; CI runs the default deterministic config + the marketing config.
  #
  # Why Xvfb: Playwright must run headed to load MV3 extensions
  # (`chromium.launchPersistentContext` is the only path that accepts an
  # `--load-extension` arg), and headed Chromium on Linux needs a display
  # server. `xvfb-run -a` allocates a disposable :99 display per
  # invocation.
  #
  # Baselines: the visual baselines live at
  # `apps/e2e/src/offline/*.visual.spec.ts-snapshots/`. A single Linux set
  # (`*-linux.png`) is committed, generated inside the same pinned
  # Playwright image this job runs in (`container:` below), so a
  # contributor's local regen is byte-identical to what this job compares
  # against. Refresh them with `pnpm e2e:baselines` (Docker) and commit the
  # diff in the same PR as the UI change — there is no bot that does it.
  e2e-offline:
    runs-on: ubuntu-latest
    # Pin the OS + fonts + Chromium build so pixel output is deterministic
    # and matches `pnpm e2e:baselines` (scripts/e2e-baselines.sh). Keep this
    # tag in lockstep with `@playwright/test` in pnpm-lock.yaml. The image
    # ships the matching browser, so no `playwright install` step is needed.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # `dependsOn: [{ projects: ['extension'], target: 'build:e2e' }]` in
      # `apps/e2e/project.json` builds the extension (chrome-mv3 by
      # default — matches the fixture's `EXTENSION_PATH`) before the
      # offline tests run.
      - name: Run offline suite
        run: xvfb-run -a pnpm nx run e2e:test

      # The Astro marketing site needs a running HTTP server (client hydration
      # + routing don't work off `file://`), so it runs in its own config
      # (`playwright.marketing.config.ts` — an `astro preview` webServer) via a
      # separate Nx target that builds the site first (`dependsOn:
      # marketing:build`). Its committed Linux baselines live at
      # `apps/e2e/src/marketing/*.visual.spec.ts-snapshots/` and are refreshed
      # with `pnpm e2e:baselines:marketing`.
      - name: Run marketing visual suite
        run: xvfb-run -a pnpm nx run e2e:test:marketing

      # The HTML report contains actual/expected/diff PNGs for every
      # visual failure — the only diagnostic that matters in triage.
      # Keep the raw test-results too: traces, videos, attachments.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            apps/e2e/playwright-report/
            apps/e2e/test-results/
          retention-days: 14
          if-no-files-found: ignore

  # Full pre-submission suite — same script run locally before any store
  # upload. Catches what the `verify` job misses: publint failures,
  # extension zip not actually produced, zip contents leaking sourcemaps
  # or other dev cruft. Duplicates some typecheck/lint/test work from
  # `verify`; the trade-off is one source of truth for what "ready to
  # publish" means.
  verify-release:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:release
