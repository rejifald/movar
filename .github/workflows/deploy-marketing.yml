name: Deploy Marketing

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-marketing.yml'
  pull_request:
    paths:
      - 'apps/marketing/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy marketing site
    env:
      HAS_CF_CREDS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run marketing:build

      - name: Ensure Pages project exists
        if: env.HAS_CF_CREDS == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if ! pnpm exec wrangler pages project list 2>/dev/null | grep -qE '(^|[[:space:]])movar-marketing([[:space:]]|$)'; then
            echo "Creating Cloudflare Pages project movar-marketing..."
            pnpm exec wrangler pages project create movar-marketing --production-branch=main
          else
            echo "Cloudflare Pages project movar-marketing already exists."
          fi

      - name: Ensure DNS records for custom domains
        if: env.HAS_CF_CREDS == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          auth="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          target="movar-marketing.pages.dev"

          zone_id=$(curl -fsS -H "$auth" \
            "https://api.cloudflare.com/client/v4/zones?name=movar.fyi" \
            | jq -r '.result[0].id // empty')
          if [ -z "$zone_id" ]; then
            echo "::error::Could not find zone ID for movar.fyi — token likely lacks Zone:Read permission"
            exit 1
          fi
          echo "Zone movar.fyi: $zone_id"

          for host in movar.fyi www.movar.fyi; do
            existing=$(curl -fsS -H "$auth" \
              "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records?name=${host}&type=CNAME" \
              | jq -r ".result[] | select(.content == \"${target}\") | .id")
            if [ -n "$existing" ]; then
              echo "✓ CNAME ${host} → ${target} already exists"
            else
              echo "→ Creating CNAME ${host} → ${target}..."
              curl -fsS -X POST -H "$auth" -H "Content-Type: application/json" \
                --data "{\"type\":\"CNAME\",\"name\":\"${host}\",\"content\":\"${target}\",\"proxied\":true}" \
                "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records" \
                | jq -r '.success, (.errors // [])[]'
            fi
          done

      - name: Ensure custom domains attached
        if: env.HAS_CF_CREDS == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/movar-marketing/domains"
          existing=$(curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$api" | jq -r '.result[].name')
          for domain in movar.fyi www.movar.fyi; do
            if echo "$existing" | grep -qFx "$domain"; then
              echo "✓ $domain already attached"
            else
              echo "→ Attaching $domain..."
              curl -fsS -X POST \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "{\"name\":\"$domain\"}" \
                "$api" | jq -r '.success, (.errors // [])[]'
            fi
          done

      - name: Deploy to Cloudflare Pages
        if: env.HAS_CF_CREDS == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.95.0'
          packageManager: pnpm
          command: pages deploy apps/marketing/dist --project-name=movar-marketing --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Missing-secrets notice
        if: env.HAS_CF_CREDS != 'true'
        run: |
          echo "::warning::CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID are not set — built the site but skipped deploy."
          echo "Add the secrets via: gh secret set CLOUDFLARE_API_TOKEN  and  gh secret set CLOUDFLARE_ACCOUNT_ID"
