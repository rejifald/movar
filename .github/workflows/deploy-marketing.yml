name: Deploy Marketing

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-marketing.yml'
  pull_request:
    paths:
      - 'apps/marketing/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy marketing site
    env:
      HAS_CF_CREDS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run marketing:build

      - name: Deploy to Cloudflare Pages
        if: env.HAS_CF_CREDS == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/marketing/dist --project-name=movar-marketing --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Missing-secrets notice
        if: env.HAS_CF_CREDS != 'true'
        run: |
          echo "::warning::CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID are not set — built the site but skipped deploy."
          echo "Add the secrets via: gh secret set CLOUDFLARE_API_TOKEN  and  gh secret set CLOUDFLARE_ACCOUNT_ID"
