name: Publish Social Posts

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'scripts/social/**'
      - '.github/workflows/publish-posts.yml'
  workflow_dispatch:

# contents: write so the job can commit the idempotency ledger
# (posts/.published.json) back after a successful publish.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Validate & publish social posts
    # Belt-and-braces: the push trigger is pinned to main, and this guard
    # blocks workflow_dispatch from any other branch.
    if: github.ref == 'refs/heads/main'
    env:
      # A network publishes only when its own id+token are set; this gate just
      # decides dry-run vs. live for the whole job.
      HAS_SOCIAL_CREDS: ${{ secrets.FB_PAGE_ACCESS_TOKEN != '' || secrets.IG_ACCESS_TOKEN != '' || secrets.THREADS_ACCESS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Always validate: malformed posts (or a missing card) fail the job,
      # whether or not credentials are present.
      - name: Validate posts
        run: pnpm social:check

      - name: Publish (live)
        if: env.HAS_SOCIAL_CREDS == 'true'
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: pnpm social:publish:live

      # Persist the idempotency ledger so a later run doesn't re-post. The
      # `[skip ci]` tag keeps this push from re-triggering the workflow.
      - name: Commit ledger
        if: env.HAS_SOCIAL_CREDS == 'true'
        run: |
          # `git add` first so a first-ever (untracked) ledger is staged too;
          # `git diff --cached` then covers both new and modified.
          git add posts/.published.json 2>/dev/null || true
          if git diff --cached --quiet -- posts/.published.json; then
            echo "Ledger unchanged — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(posts): record published social posts [skip ci]"
            git push
          fi

      - name: Dry run (no credentials)
        if: env.HAS_SOCIAL_CREDS != 'true'
        run: |
          echo "::warning::No social credentials set — validated and dry-ran posts but published nothing."
          echo "Add secrets (FB_PAGE_ID, FB_PAGE_ACCESS_TOKEN, IG_USER_ID, IG_ACCESS_TOKEN, THREADS_USER_ID, THREADS_ACCESS_TOKEN) to enable publishing. See posts/README.md."
          pnpm social:publish
