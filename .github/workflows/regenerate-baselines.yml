name: Regenerate visual baselines (Linux)

# Manual-only. Regenerates the Linux-platform visual baselines for the
# offline e2e suite (popup + options) and opens a PR with the fresh
# `*-linux.png` files targeting whatever ref dispatched the workflow.
#
# Why dispatch-only: visual baselines are platform-specific (Playwright
# suffixes each PNG with `-<platform>.png` because Chromium's pixel
# output differs between macOS and Linux). The repo commits both
# `*-darwin.png` and `*-linux.png` sets; macOS baselines are regenerated
# by contributors locally (`pnpm --filter @movar/e2e test:update`),
# and the Linux set is regenerated here.
#
# When to run: trigger this from the Actions tab whenever an intentional
# UI change has shifted pixels and `e2e-offline` is failing on visual
# diffs. Pick the feature branch with the UI change (or `main` if the
# change has already merged and only Linux is stale). The workflow runs
# `test:update` under Xvfb, commits any new `*-linux.png` files onto a
# dedicated `bot/regenerate-baselines-<run_id>` branch, and opens a PR
# back to the dispatched ref.
#
# Why a PR (not a direct push): pushing straight to the dispatched ref
# bypassed the branch-protection ruleset — a baseline commit could land on
# a protected branch without `metrics-gate` / `verify` / `e2e-offline`
# ever gating it, breaking the "everything on `main` passed the gate"
# invariant. Routing through a PR runs the required checks like any other
# change, at the cost of one merge click. Regenerated baselines are
# mechanical, so review is usually a glance — but the gate is real.
#
# Why a PAT (`BASELINE_BOT_PAT`): the PR's head branch is pushed with a
# real-identity PAT so `pull_request` -> `ci.yml` fires on it (a push made
# with the default `GITHUB_TOKEN` does NOT trigger downstream workflows —
# GitHub's infinite-loop guard — so the PR would sit with no CI and never
# go green). `gh pr create` then opens the PR with the same token. The PAT
# only ever pushes to its own `bot/regenerate-baselines-*` branch and
# opens a PR; it no longer writes to a protected branch directly, so it
# needs no more than Contents: Write + Pull-requests: Write (a fine-grained
# PAT scoped to this repo, or a GitHub App token via
# actions/create-github-app-token, which is shorter-lived and the
# preferred replacement).

on:
  workflow_dispatch:

# `contents: write` + `pull-requests: write` let the default token (and the
# PAT) push the bot branch and open the PR. No `actions: write` — we no
# longer dispatch a workflow; CI re-triggers via the PAT push to the PR head.
permissions:
  contents: write
  pull-requests: write

# Serialise dispatches per ref — two simultaneous regenerations would
# race on the same push and one would lose the race with a
# non-fast-forward rejection.
concurrency:
  group: regenerate-baselines-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      # `ref:` is implicit (defaults to the ref that dispatched us). We
      # check out with a PAT (`BASELINE_BOT_PAT`) so the later `git push` to
      # the bot branch is authenticated as a real identity — a GITHUB_TOKEN
      # push would not re-trigger `ci.yml` on the PR head (loop guard), but a
      # PAT push does. The PAT pushes only to `bot/regenerate-baselines-*`
      # and opens a PR; it never writes to the protected ref directly.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.BASELINE_BOT_PAT }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Same cache key as the `e2e-offline` job in `ci.yml` — share the
      # cache pool so a recent CI run primes this dispatch and vice
      # versa.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @movar/e2e exec playwright install --with-deps chromium

      # `--update-snapshots` writes the actual pixels to the baseline
      # path and exits 0 for every visual test; the structural and
      # behavior specs run unmodified, so a popup/options-mount
      # regression or a content-script regression still fails this job
      # — we want that. The Nx `dependsOn` builds the extension first.
      - name: Regenerate Linux baselines
        run: xvfb-run -a pnpm nx run e2e:test:update

      # Stage just the snapshot dirs. The glob catches every committed
      # `*.visual.spec.ts-snapshots/*-linux.png` (popup + options
      # today, any future visual spec automatically). Anything else the
      # update run might have incidentally touched stays out of the
      # commit.
      - name: Commit baselines and open a PR
        env:
          # Disable lefthook for this run: the local repo hooks
          # (`pre-commit`: prettier, vitest; `pre-push`: e2e-fast,
          # metrics) are author-time validation that doesn't belong in
          # an automated baseline regen — e2e-fast in particular tries
          # to launch headed Chromium and there's no Xvfb wrapping
          # available here, so it would fail with "no X server".
          LEFTHOOK: 0
          # `gh` authenticates with the same real-identity PAT that pushes the
          # bot branch, so the PR is opened by the bot account and its head
          # push re-triggers ci.yml via pull_request.
          GH_TOKEN: ${{ secrets.BASELINE_BOT_PAT }}
          TARGET_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add 'apps/e2e/src/offline/*.visual.spec.ts-snapshots/*-linux.png'

          # `--cached --quiet` exits 1 iff there are staged changes.
          # When `update-snapshots` is a no-op (baselines already
          # current), skip the commit + PR — there's nothing to ship.
          if git diff --cached --quiet; then
            echo 'Linux baselines were already current — no commit, no PR.'
            exit 0
          fi

          # Land the diff on a dedicated bot branch and open a PR back to the
          # dispatched ref, instead of pushing straight to it. The PR runs the
          # required checks (verify / metrics-gate / e2e-offline / …) and
          # merges through the branch-protection ruleset like any other change
          # — restoring the "everything on the protected ref passed the gate"
          # invariant the old direct push bypassed.
          branch="bot/regenerate-baselines-${{ github.run_id }}"
          git switch -c "$branch"
          git commit -m 'chore(e2e): regenerate visual baselines (Linux)'
          # PAT-authenticated push (see checkout) to the PR head re-triggers
          # ci.yml via pull_request — the new check registers on its own.
          git push origin "$branch"
          gh pr create \
            --base "$TARGET_REF" \
            --head "$branch" \
            --title 'chore(e2e): regenerate visual baselines (Linux)' \
            --body "Automated Linux visual-baseline regeneration (run \`${{ github.run_id }}\`). Mechanical \`*-linux.png\` output from \`pnpm nx run e2e:test:update\` under Xvfb; merge once the required checks pass."
          echo "Opened a PR from $branch -> $TARGET_REF; CI runs via the PAT push."
