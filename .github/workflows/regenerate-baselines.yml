name: Regenerate visual baselines (Linux)

# Manual-only. Regenerates the Linux-platform visual baselines for the
# offline e2e suite (popup + options) and opens a PR with the resulting
# `*-linux.png` files.
#
# Why dispatch-only: visual baselines are platform-specific (Playwright
# suffixes each PNG with `-<platform>.png` because Chromium's pixel
# output differs between macOS and Linux). The repo commits both
# `*-darwin.png` and `*-linux.png` sets; macOS baselines are regenerated
# by contributors locally (`pnpm --filter @movar/e2e test:offline:update`),
# and the Linux set is regenerated here.
#
# When to run: trigger this from the Actions tab whenever an intentional
# UI change has shifted pixels and `e2e-offline` is failing on visual
# diffs. Pick the feature branch with the UI change (or `main` if the
# change has already merged and only Linux is stale). The workflow runs
# `test:offline:update` under Xvfb, then opens a PR back to the same ref
# with just the updated `*-linux.png` files (both popup and options
# baselines).
#
# Prerequisite repo setting: Settings → Actions → General → Workflow
# permissions → "Allow GitHub Actions to create and approve pull
# requests". Without it the `peter-evans/create-pull-request` step fails
# at PR-creation time with a 403.

on:
  workflow_dispatch:

# `contents: write` for the temp branch push; `pull-requests: write` for
# `peter-evans/create-pull-request`.
permissions:
  contents: write
  pull-requests: write

# Serialise dispatches per ref — two simultaneous regenerations would
# race the same branch name and one would fail.
concurrency:
  group: regenerate-baselines-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Same cache key as the `e2e-offline` job in `ci.yml` — share the
      # cache pool so a recent CI run primes this dispatch and vice
      # versa.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @movar/e2e exec playwright install --with-deps chromium

      # `--update-snapshots` writes the actual pixels to the baseline
      # path and exits 0 for every visual test; the structural and
      # behavior specs run unmodified, so a popup/options-mount
      # regression or a content-script regression still fails this job
      # — we want that. The Nx `dependsOn` builds the extension first.
      - name: Regenerate Linux baselines
        run: xvfb-run -a pnpm nx run e2e:test:offline:update

      # `add-paths` scopes the commit to just the snapshot dirs — if the
      # update run incidentally touches anything else (it shouldn't),
      # those changes stay out of the PR. The glob catches both
      # `popup.visual.spec.ts-snapshots/` and
      # `options.visual.spec.ts-snapshots/` without enumerating each
      # spec. peter-evans/create-pull-request exits cleanly with an
      # empty PR / no-op message if no PNGs moved.
      - name: Open PR with updated baselines
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(e2e): regenerate visual baselines (Linux)'
          title: 'chore(e2e): regenerate visual baselines (Linux)'
          branch: chore/e2e-baselines-linux
          delete-branch: true
          add-paths: |
            apps/e2e/src/tests/*.visual.spec.ts-snapshots/*-linux.png
          body: |
            Regenerated by the `regenerate-baselines` workflow against
            `${{ github.ref_name }}`.

            Updated PNGs are under
            `apps/e2e/src/tests/popup.visual.spec.ts-snapshots/` and
            `apps/e2e/src/tests/options.visual.spec.ts-snapshots/`, all
            `*-linux.png`. Review the diff images the same way you'd
            review any visual change — every new image should match the
            design at the moment of regeneration. Pair this with the
            matching `*-darwin.png` updates (regenerated locally via
            `pnpm --filter @movar/e2e test:offline:update`) so both
            platforms stay in lockstep.

            If this PR is empty / closes immediately, the Linux baselines
            were already current.
