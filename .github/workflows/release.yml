name: Release

# Submits the extension to AMO, Chrome Web Store, Edge Add-ons, and — when
# Apple signing secrets are present — the App Store (iOS + macOS) plus a
# notarized direct-download .dmg. Attaches the four web-ext artifact zips
# (chrome, firefox, safari, sources) and the notarized macOS .dmg to the
# GitHub Release for archival.
#
# Trigger: publish a GitHub Release whose tag matches `extension-v<semver>`
# (e.g. `extension-v1.0.1`). The tag must match
# `apps/extension/package.json` `version` exactly — the `prepare` job
# hard-fails otherwise.
#
# Manual `workflow_dispatch` is also allowed, with a `dry_run` input
# (default: true) that builds + validates without publishing. Flip it to
# false when you want a dispatch to actually submit.
#
# Pushing to a `release/**` branch runs the same build + validate + audit
# suite automatically — an implicit dry-run, so the full pre-submission
# check goes green on the branch before you ever publish the Release. Store
# submission is gated on the event type (see each store job's `if:`): only a
# published Release, or a `workflow_dispatch` with `dry_run=false`, reaches
# AMO / CWS / Edge. A branch push can NEVER publish.
#
# Each store job is gated on the presence of its credentials: missing
# secrets log a warning and skip, rather than failing the whole release.
# This lets you wire up one store at a time without breaking the others.
#
# Required-approval gate: every store job declares `environment: production`,
# so a published Release (or a dispatch with dry_run=false) PAUSES on each
# store job — it parks as "Waiting" until a human approves the deployment via
# the `production` GitHub Environment's required reviewers. The `prepare` job
# is intentionally NOT in the environment, so the build + validate + audit
# suite (and every dry-run) still runs unattended. Expect the manual approval
# click on every real release — that pause is the point. One-time setup
# (create the Environment, add reviewers): docs/release-credentials.md.
#
# Safari ships through the `release-safari` job on a macOS runner: it
# archives the Xcode wrapper, uploads the iOS + macOS builds to App Store
# Connect, and notarizes a Developer ID .dmg for direct download. Like the
# other store jobs it skips (with a warning) when its Apple secrets are
# absent, so it stays dormant until the Apple Developer account is enrolled
# and the secrets are set. Setup + secrets: docs/safari-deploy.md.
#
# Reviewers at every store are still humans — this workflow only delivers
# the artifact to each store's review queue.
#
# Credentials setup: docs/release-credentials.md

on:
  # Auto dry-run: every push to a release branch validates the release
  # artifact. Never submits — the store jobs' `if:` excludes `push`.
  push:
    branches:
      - 'release/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and validate, but do not publish.'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  # Supersede an in-flight dry-run when a newer commit is pushed to the same
  # release branch; never cancel a real release/dispatch mid-flight.
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Verify the tag (if present) matches the package version. The
      # released artifact is named after the package version; a mismatch
      # would publish a confusingly-named build.
      - id: version
        name: Resolve and verify version
        run: |
          v=$(node -p "require('./apps/extension/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Extension version: $v"

          if [ "${{ github.ref_type }}" = "tag" ]; then
            expected="extension-v$v"
            actual="${{ github.ref_name }}"
            if [ "$expected" != "$actual" ]; then
              echo "::error::Tag $actual does not match package version $v (expected $expected)"
              exit 1
            fi
          fi

      # Full pre-submission suite: typecheck + lint + test + publint, then
      # build chrome + firefox zips and audit their contents. Identical to
      # what we run locally before any manual upload. Safari isn't covered
      # by this script (no AMO linter / reproducibility checks apply); it
      # gets built separately below.
      - run: pnpm verify:release

      # Safari zip is for archival only. It's not directly submittable —
      # App Store distribution requires an Xcode app wrapper around the
      # unpacked extension. We attach it to the Release so the version
      # that ships everywhere else is also preserved for Safari, even
      # though the Safari submit step happens by hand.
      - run: pnpm --filter @movar/extension zip:safari

      # AMO source bundle for Firefox's source-code review. `pack:amo-source`
      # snapshots `git archive HEAD` — the full monorepo (pnpm-lock.yaml +
      # pnpm-workspace.yaml + every workspace package), the only archive a
      # reviewer can `pnpm install` from. WXT's own `*-sources.zip` is rooted
      # inside apps/extension/ and omits the workspace, so it cannot be
      # rebuilt and would fail review. HEAD is the release commit and the
      # runner's checkout is clean, so the script's clean-tree guard passes.
      # Writes apps/extension/.output/movar-extension-<version>-amo-source.zip,
      # which rides along in the artifact upload below.
      - run: pnpm pack:amo-source

      # Upload the entire .output/ tree (unpacked dirs + all five zips: chrome,
      # firefox, safari, the WXT sources side-effect, and the AMO source
      # bundle) so each store job can pick what it needs without rebuilding.
      - uses: actions/upload-artifact@v7
        with:
          name: extension-output
          path: apps/extension/.output/
          retention-days: 14
          if-no-files-found: error
          # Required: WXT writes to `.output/`, whose leading dot makes
          # every file count as "hidden" under the action's default filter.
          include-hidden-files: true

      # Attach the chrome / firefox / safari / sources zips to the GitHub
      # Release itself so they live alongside the release notes and stay
      # downloadable long after the Actions artifact retention expires.
      # Only runs when triggered by a published Release — workflow_dispatch
      # runs leave artifacts in the Actions artifact store only.
      - if: github.event_name == 'release'
        name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            apps/extension/.output/*.zip \
            --clobber

  release-firefox:
    needs: prepare
    runs-on: ubuntu-latest
    # Required-approval gate: the `production` GitHub Environment (Settings →
    # Environments) carries required reviewers, so this job parks as
    # "Waiting" until a human approves before any AMO upload runs. `prepare`
    # is deliberately NOT in the environment, so dry-runs and the pre-submission
    # suite still run unattended.
    environment: production
    # Submit only for a published Release, or a dispatch explicitly opting in
    # with dry_run=false. `push` (release-branch dry-run) is excluded, so a
    # branch push validates but never reaches a store.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      # Checkout must precede download-artifact: actions/checkout@v6
      # cleans the workspace (`git clean -ffdx`) and would otherwise wipe
      # the just-downloaded .output/ tree. We need the repo here for the
      # `.nvmrc` that setup-node reads below.
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: extension-output
          path: .output/

      - id: check
        name: Check AMO credentials
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "::warning::AMO credentials missing (AMO_JWT_ISSUER / AMO_JWT_SECRET) — skipping Firefox release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      # web-ext sign with --channel=listed uploads the unpacked extension
      # AND the source bundle to AMO via the Submission API, then submits the
      # version for review. The source bundle is the monorepo archive the
      # prepare job built with `pnpm pack:amo-source` (lockfile + workspace
      # config + every workspace package) — NOT WXT's `*-sources.zip`, which
      # is rooted inside apps/extension/ and can't be rebuilt by a reviewer.
      # The first listing must still be created by hand in the AMO dashboard
      # so the listing metadata exists; subsequent versions flow through this
      # job.
      - if: steps.check.outputs.skip != 'true'
        name: Submit to AMO
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          amo_source_zip=$(ls .output/*-amo-source.zip)
          if [ ! -f "$amo_source_zip" ]; then
            echo "::error::AMO source bundle (.output/*-amo-source.zip) not found — did the prepare job run 'pnpm pack:amo-source'?"
            exit 1
          fi
          npx --yes web-ext@8 sign \
            --channel=listed \
            --source-dir=.output/firefox-mv3 \
            --upload-source-code="$amo_source_zip" \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"

  release-chrome:
    needs: prepare
    runs-on: ubuntu-latest
    # Required-approval gate — see release-firefox. Parks as "Waiting" until a
    # human approves the `production` environment before the CWS upload runs.
    environment: production
    # Submit only for a published Release, or a dispatch explicitly opting in
    # with dry_run=false. `push` (release-branch dry-run) is excluded, so a
    # branch push validates but never reaches a store.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      # Need the repo for scripts/cws-publish.mjs. The script is pure
      # Node — no pnpm install required, just Node 22+.
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: extension-output
          path: .output/

      - id: check
        name: Check Chrome Web Store credentials
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          if [ -z "$CWS_CLIENT_ID" ] || [ -z "$CWS_CLIENT_SECRET" ] \
            || [ -z "$CWS_REFRESH_TOKEN" ] || [ -z "$CWS_EXTENSION_ID" ]; then
            echo "::warning::Chrome Web Store credentials missing — skipping Chrome release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      # In-house upload + publish (scripts/cws-publish.mjs). Pure Node,
      # zero npm deps — talks directly to Google's CWS REST API so our
      # CLIENT_SECRET / REFRESH_TOKEN never touch a third-party package.
      # For a human gate, set `trustedTesters` in the Chrome dashboard and
      # the script will still publish; CWS holds the visibility until you
      # flip the toggle.
      - if: steps.check.outputs.skip != 'true'
        name: Submit to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          SOURCE_ZIP=$(ls .output/*-chrome.zip)
          export SOURCE_ZIP
          node scripts/cws-publish.mjs

  release-edge:
    needs: prepare
    runs-on: ubuntu-latest
    # Required-approval gate — see release-firefox. Parks as "Waiting" until a
    # human approves the `production` environment before the Edge upload runs.
    environment: production
    # Submit only for a published Release, or a dispatch explicitly opting in
    # with dry_run=false. `push` (release-branch dry-run) is excluded, so a
    # branch push validates but never reaches a store.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: extension-output
          path: .output/

      - id: check
        name: Check Edge Add-ons credentials
        env:
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
        run: |
          if [ -z "$EDGE_CLIENT_ID" ] || [ -z "$EDGE_API_KEY" ] \
            || [ -z "$EDGE_PRODUCT_ID" ]; then
            echo "::warning::Edge Add-ons credentials missing — skipping Edge release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      # Microsoft Edge Add-ons API v1.1 — API-key auth (Authorization: ApiKey +
      # X-ClientID), async upload with polling, then a publish call. v1 used an
      # OAuth2 client_credentials flow against login.microsoftonline.com; that
      # flow was retired on 2024-12-31 and v1.1 is now the only supported
      # version. Endpoint paths, methods, content types, 202+Location
      # semantics, and the InProgress/Succeeded/Failed status enum are
      # unchanged between v1 and v1.1 — only the auth differs.
      # Documented at
      # https://learn.microsoft.com/en-us/microsoft-edge/extensions-chromium/publish/api/using-addons-api
      - if: steps.check.outputs.skip != 'true'
        name: Submit to Edge Add-ons
        env:
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
        run: |
          set -euo pipefail
          chrome_zip=$(ls .output/*-chrome.zip)
          api="https://api.addons.microsoftedge.microsoft.com/v1/products/$EDGE_PRODUCT_ID"

          echo "==> Uploading package"
          upload_op=$(curl -fsS -D /tmp/edge-upload-headers -X POST \
            "$api/submissions/draft/package" \
            -H "Authorization: ApiKey $EDGE_API_KEY" \
            -H "X-ClientID: $EDGE_CLIENT_ID" \
            -H "Content-Type: application/zip" \
            --data-binary "@$chrome_zip" -o /dev/null -w '%{http_code}')
          [ "$upload_op" = "202" ] || { echo "::error::Edge upload returned HTTP $upload_op"; cat /tmp/edge-upload-headers; exit 1; }
          op_id=$(grep -i '^location:' /tmp/edge-upload-headers | awk -F'/' '{print $NF}' | tr -d '\r\n ')
          echo "Operation ID: $op_id"

          echo "==> Polling upload status"
          for i in $(seq 1 60); do
            status=$(curl -fsS "$api/submissions/draft/package/operations/$op_id" \
              -H "Authorization: ApiKey $EDGE_API_KEY" \
              -H "X-ClientID: $EDGE_CLIENT_ID" | jq -r .status)
            echo "  [$i/60] $status"
            case "$status" in
              InProgress) sleep 10 ;;
              Succeeded) break ;;
              *) echo "::error::Edge package validation failed: $status"; exit 1 ;;
            esac
          done

          echo "==> Publishing submission"
          publish_code=$(curl -fsS -X POST "$api/submissions" \
            -H "Authorization: ApiKey $EDGE_API_KEY" \
            -H "X-ClientID: $EDGE_CLIENT_ID" \
            -H "Content-Type: application/json" \
            --data "{\"notes\":\"Automated release from CI for $GITHUB_REF_NAME\"}" \
            -o /dev/null -w '%{http_code}')
          [ "$publish_code" = "202" ] || { echo "::error::Edge publish returned HTTP $publish_code"; exit 1; }
          echo "Submitted to Edge Add-ons review queue."

  release-safari:
    needs: prepare
    # macOS runner is required for xcodebuild / notarytool. Pinned for a
    # deterministic Xcode (the modern `app-store-connect` export method needs
    # Xcode 15.3+). macOS minutes cost ~10x Linux, so — like the other store
    # jobs — this runs only at release time; per-PR coverage is the cheap
    # Linux `build:safari` web-ext build in ci.yml.
    runs-on: macos-15
    # Required-approval gate — see release-firefox. Parks as "Waiting" until a
    # human approves the `production` environment before any App Store / notarize
    # step runs.
    environment: production
    # Submit only for a published Release, or a dispatch explicitly opting in
    # with dry_run=false. A release-branch push validates the web-ext build in
    # `prepare` but never reaches Apple.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      - uses: actions/checkout@v6

      - id: check
        name: Check Apple signing credentials
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          APPLE_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          APPLE_ASC_API_KEY_P8: ${{ secrets.APPLE_ASC_API_KEY_P8 }}
          APPLE_DIST_CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_ASC_KEY_ID" ] \
            || [ -z "$APPLE_ASC_ISSUER_ID" ] || [ -z "$APPLE_ASC_API_KEY_P8" ] \
            || [ -z "$APPLE_DIST_CERT_P12_BASE64" ] \
            || [ -z "$APPLE_DEVELOPER_ID_CERT_P12_BASE64" ]; then
            echo "::warning::Apple credentials missing — skipping Safari release (see docs/safari-deploy.md)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip != 'true'
        uses: pnpm/action-setup@v6
      - if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - if: steps.check.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      # Build the Safari web extension and sync it into the Xcode project's
      # Extension Resources (gitignored; empty on a fresh runner).
      - if: steps.check.outputs.skip != 'true'
        run: pnpm --filter @movar/extension build:safari

      # One self-contained step: stand up a throwaway keychain, archive both
      # apps, export + upload to App Store Connect, then export + notarize +
      # staple the Developer ID build and package the .dmg. Kept in a single
      # shell so the generated keychain password and temp paths stay in scope.
      - if: steps.check.outputs.skip != 'true'
        name: Archive, sign, notarize, and submit
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          APPLE_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          APPLE_ASC_API_KEY_P8: ${{ secrets.APPLE_ASC_API_KEY_P8 }}
          APPLE_DIST_CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_RELEASE: ${{ github.event_name == 'release' }}
        run: |
          set -euo pipefail
          PROJECT="apps/extension/safari/Movar/Movar.xcodeproj"
          KEY_PATH="$HOME/.private_keys/AuthKey_${APPLE_ASC_KEY_ID}.p8"

          # --- throwaway keychain + signing certs ---
          KEYCHAIN="$RUNNER_TEMP/movar-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$APPLE_DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          echo "$APPLE_DEVELOPER_ID_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/devid.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$APPLE_DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security import "$RUNNER_TEMP/devid.p12" -k "$KEYCHAIN" -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make our throwaway keychain the (only) user keychain so xcodebuild's
          # automatic signing finds the imported identities. The runner is
          # ephemeral, so replacing the search list is fine.
          security list-keychains -d user -s "$KEYCHAIN"
          security default-keychain -d user -s "$KEYCHAIN"

          # --- App Store Connect API key (archive profiles + altool + notarytool) ---
          mkdir -p "$HOME/.private_keys" "$HOME/.appstoreconnect/private_keys"
          echo "$APPLE_ASC_API_KEY_P8" | base64 --decode > "$KEY_PATH"
          cp "$KEY_PATH" "$HOME/.appstoreconnect/private_keys/"

          AUTH=( -allowProvisioningUpdates
            -authenticationKeyPath "$KEY_PATH"
            -authenticationKeyID "$APPLE_ASC_KEY_ID"
            -authenticationKeyIssuerID "$APPLE_ASC_ISSUER_ID" )
          VERS=( MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="$BUILD_NUMBER" DEVELOPMENT_TEAM="$APPLE_TEAM_ID" )

          # --- archive iOS + macOS ---
          xcodebuild -project "$PROJECT" -scheme "Movar (iOS)" -configuration Release \
            -destination 'generic/platform=iOS' -archivePath "$RUNNER_TEMP/Movar-iOS.xcarchive" \
            "${VERS[@]}" "${AUTH[@]}" archive
          xcodebuild -project "$PROJECT" -scheme "Movar (macOS)" -configuration Release \
            -destination 'generic/platform=macOS' -archivePath "$RUNNER_TEMP/Movar-macOS.xcarchive" \
            "${VERS[@]}" "${AUTH[@]}" archive

          # --- App Store: export + upload (iOS .ipa, macOS .pkg) ---
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/Movar-iOS.xcarchive" \
            -exportPath "$RUNNER_TEMP/appstore-ios" \
            -exportOptionsPlist apps/extension/safari/exportOptions/app-store.plist "${AUTH[@]}"
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/Movar-macOS.xcarchive" \
            -exportPath "$RUNNER_TEMP/appstore-mac" \
            -exportOptionsPlist apps/extension/safari/exportOptions/app-store.plist "${AUTH[@]}"
          xcrun altool --upload-app -t ios \
            -f "$(ls "$RUNNER_TEMP"/appstore-ios/*.ipa)" \
            --apiKey "$APPLE_ASC_KEY_ID" --apiIssuer "$APPLE_ASC_ISSUER_ID"
          xcrun altool --upload-app -t macos \
            -f "$(ls "$RUNNER_TEMP"/appstore-mac/*.pkg)" \
            --apiKey "$APPLE_ASC_KEY_ID" --apiIssuer "$APPLE_ASC_ISSUER_ID"

          # --- Developer ID: export + notarize + staple + .dmg (direct download) ---
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/Movar-macOS.xcarchive" \
            -exportPath "$RUNNER_TEMP/devid-mac" \
            -exportOptionsPlist apps/extension/safari/exportOptions/developer-id.plist "${AUTH[@]}"
          APP="$RUNNER_TEMP/devid-mac/Movar.app"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/Movar-notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/Movar-notarize.zip" \
            --key "$KEY_PATH" --key-id "$APPLE_ASC_KEY_ID" --issuer "$APPLE_ASC_ISSUER_ID" --wait
          xcrun stapler staple "$APP"
          DMG="$RUNNER_TEMP/Movar-${VERSION}.dmg"
          hdiutil create -volname "Movar" -srcfolder "$APP" -ov -format UDZO "$DMG"

          # Attach the notarized .dmg to the GitHub Release (release event only).
          if [ "$IS_RELEASE" = "true" ]; then
            gh release upload "$RELEASE_TAG" "$DMG" --clobber
          fi
          echo "Safari: uploaded iOS + macOS to App Store Connect; notarized $DMG."
