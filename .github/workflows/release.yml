name: Release

# Submits the extension to AMO, Chrome Web Store, and Edge Add-ons.
#
# Trigger: push a tag matching `extension-v<semver>` (e.g. `extension-v1.0.1`).
# The tag must match `apps/extension/package.json` `version` exactly — the
# `prepare` job hard-fails otherwise. Manual `workflow_dispatch` is also
# allowed, with an optional `dry_run` input that builds + validates without
# publishing.
#
# Each store job is gated on the presence of its credentials: missing
# secrets log a warning and skip, rather than failing the whole release.
# This lets you wire up one store at a time without breaking the others.
#
# Reviewers at every store are still humans — this workflow only delivers
# the artifact to each store's review queue.
#
# Credentials setup: docs/release-credentials.md

on:
  push:
    tags: ['extension-v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and validate, but do not publish.'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Verify the tag (if present) matches the package version. The
      # released artifact is named after the package version; a mismatch
      # would publish a confusingly-named build.
      - id: version
        name: Resolve and verify version
        run: |
          v=$(node -p "require('./apps/extension/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Extension version: $v"

          if [ "${{ github.ref_type }}" = "tag" ]; then
            expected="extension-v$v"
            actual="${{ github.ref_name }}"
            if [ "$expected" != "$actual" ]; then
              echo "::error::Tag $actual does not match package version $v (expected $expected)"
              exit 1
            fi
          fi

      # Full pre-submission suite: typecheck + lint + test + publint, then
      # build both zips and audit their contents. Identical to what we run
      # locally before any manual upload.
      - run: pnpm verify:release

      # Upload the entire .output/ tree (unpacked dirs + zips + sources zip)
      # so each store job can pick what it needs without rebuilding.
      - uses: actions/upload-artifact@v4
        with:
          name: extension-output
          path: apps/extension/.output/
          retention-days: 14
          if-no-files-found: error

  release-firefox:
    needs: prepare
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-output
          path: .output/

      - id: check
        name: Check AMO credentials
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "::warning::AMO credentials missing (AMO_JWT_ISSUER / AMO_JWT_SECRET) — skipping Firefox release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # web-ext sign with --channel=listed uploads the unpacked extension
      # AND the sources zip to AMO via the Submission API, then submits the
      # version for review. The first listing must still be created by hand
      # in the AMO dashboard so the listing metadata exists; subsequent
      # versions flow through this job.
      - if: steps.check.outputs.skip != 'true'
        name: Submit to AMO
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          sources_zip=$(ls .output/*-sources.zip)
          npx --yes web-ext@8 sign \
            --channel=listed \
            --source-dir=.output/firefox-mv3 \
            --upload-source-code="$sources_zip" \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"

  release-chrome:
    needs: prepare
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-output
          path: .output/

      - id: check
        name: Check Chrome Web Store credentials
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          if [ -z "$CWS_CLIENT_ID" ] || [ -z "$CWS_CLIENT_SECRET" ] \
            || [ -z "$CWS_REFRESH_TOKEN" ] || [ -z "$CWS_EXTENSION_ID" ]; then
            echo "::warning::Chrome Web Store credentials missing — skipping Chrome release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Upload + publish are separate calls. We always publish after upload;
      # if you want a human gate, set `trustedTesters` in the Chrome dashboard
      # so `publish` only releases to that group until you flip the toggle.
      - if: steps.check.outputs.skip != 'true'
        name: Submit to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          chrome_zip=$(ls .output/*-chrome.zip)
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "$chrome_zip" \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"
          npx --yes chrome-webstore-upload-cli@3 publish \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"

  release-edge:
    needs: prepare
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-output
          path: .output/

      - id: check
        name: Check Edge Add-ons credentials
        env:
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_CLIENT_SECRET: ${{ secrets.EDGE_CLIENT_SECRET }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_TENANT_ID: ${{ secrets.EDGE_TENANT_ID }}
        run: |
          if [ -z "$EDGE_CLIENT_ID" ] || [ -z "$EDGE_CLIENT_SECRET" ] \
            || [ -z "$EDGE_PRODUCT_ID" ] || [ -z "$EDGE_TENANT_ID" ]; then
            echo "::warning::Edge Add-ons credentials missing — skipping Edge release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      # Microsoft Edge Add-ons API v1.1 — OAuth2 client_credentials flow,
      # async upload with polling, then a publish call. Documented at
      # https://learn.microsoft.com/en-us/microsoft-edge/extensions-chromium/publish/api/using-addons-api
      - if: steps.check.outputs.skip != 'true'
        name: Submit to Edge Add-ons
        env:
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_CLIENT_SECRET: ${{ secrets.EDGE_CLIENT_SECRET }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_TENANT_ID: ${{ secrets.EDGE_TENANT_ID }}
        run: |
          set -euo pipefail
          chrome_zip=$(ls .output/*-chrome.zip)
          api="https://api.addons.microsoftedge.microsoft.com/v1/products/$EDGE_PRODUCT_ID"

          echo "==> Requesting access token"
          access_token=$(curl -fsS -X POST \
            "https://login.microsoftonline.com/$EDGE_TENANT_ID/oauth2/v2.0/token" \
            -d "client_id=$EDGE_CLIENT_ID" \
            -d "client_secret=$EDGE_CLIENT_SECRET" \
            -d "scope=https://api.addons.microsoftedge.microsoft.com/.default" \
            -d "grant_type=client_credentials" | jq -r .access_token)
          [ -n "$access_token" ] && [ "$access_token" != "null" ] || { echo "::error::Failed to obtain Edge access token"; exit 1; }

          echo "==> Uploading package"
          upload_op=$(curl -fsS -D /tmp/edge-upload-headers -X POST \
            "$api/submissions/draft/package" \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Type: application/zip" \
            --data-binary "@$chrome_zip" -o /dev/null -w '%{http_code}')
          [ "$upload_op" = "202" ] || { echo "::error::Edge upload returned HTTP $upload_op"; cat /tmp/edge-upload-headers; exit 1; }
          op_id=$(grep -i '^location:' /tmp/edge-upload-headers | awk -F'/' '{print $NF}' | tr -d '\r\n ')
          echo "Operation ID: $op_id"

          echo "==> Polling upload status"
          for i in $(seq 1 60); do
            status=$(curl -fsS "$api/submissions/draft/package/operations/$op_id" \
              -H "Authorization: Bearer $access_token" | jq -r .status)
            echo "  [$i/60] $status"
            case "$status" in
              InProgress) sleep 10 ;;
              Succeeded) break ;;
              *) echo "::error::Edge package validation failed: $status"; exit 1 ;;
            esac
          done

          echo "==> Publishing submission"
          publish_code=$(curl -fsS -X POST "$api/submissions" \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Length: 0" \
            -o /dev/null -w '%{http_code}')
          [ "$publish_code" = "202" ] || { echo "::error::Edge publish returned HTTP $publish_code"; exit 1; }
          echo "Submitted to Edge Add-ons review queue."
