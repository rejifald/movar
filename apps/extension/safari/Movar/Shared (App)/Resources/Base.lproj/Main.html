<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'" />

    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

    <link rel="stylesheet" href="../Style.css" />
    <script src="../Script.js" defer></script>
  </head>
  <body>
    <img src="../Icon.png" width="128" height="128" alt="Movar" />
    <h1>Movar</h1>
    <p class="tagline">Keep the internet in the language you actually read.</p>
    <p class="platform-ios">Turn on Movar in Safari → Extensions, inside the Settings app.</p>
    <p class="platform-mac state-unknown">Turn on Movar in Safari → Settings → Extensions.</p>
    <p class="platform-mac state-on">Movar is on. Manage it in Safari → Settings → Extensions.</p>
    <p class="platform-mac state-off">
      Movar is off. Turn it back on in Safari → Settings → Extensions.
    </p>
    <button class="platform-mac open-preferences">Quit and Open Safari Settings…</button>
  </body>
</html>
