<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <style>
      .title { font-family: 'Manrope', system-ui, sans-serif; font-weight: 800; font-size: 96px; fill: #1c1917; }
      .accent { fill: #15803d; }
      .tagline { font-family: 'Manrope', system-ui, sans-serif; font-weight: 800; font-size: 64px; fill: #1c1917; }
      .caption { font-family: 'Manrope', system-ui, sans-serif; font-weight: 400; font-size: 24px; fill: #737373; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fafaf9"/>

  <!-- Logo: movar.fyi -->
  <text x="60" y="130" class="title">movar</text>
  <text x="60" y="180" class="title accent">.fyi</text>

  <!-- Tagline -->
  <text x="100" y="360" class="tagline">Keep the internet</text>
  <text x="100" y="445" class="tagline">in your language.</text>

  <!-- Bottom right accent dot -->
  <circle cx="1120" cy="560" r="12" fill="#15803d"/>

  <!-- Caption -->
  <text x="1050" y="595" class="caption" text-anchor="end">Free · Open source · No tracking</text>
</svg>
