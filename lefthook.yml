pre-commit:
  parallel: false
  commands:
    prettier:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs,json,md,yml,yaml,css,html}'
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs}'
      run: pnpm lint
    typecheck:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs,astro,json}'
      run: pnpm typecheck
    test:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs}'
      run: pnpm test
    readme-parity:
      # Keep README.md honest about the tagline (vs the marketing hero), the
      # monorepo layout (vs apps/* + packages/*), the generated metrics badge
      # block (vs its committed sources: the wxt manifest permissions and
      # LICENSE), and the verified product promises (LICENSE, the extension
      # manifest + source, and the settings defaults — checked against the
      # marketing claims in i18n.ts). Gated so it only runs when a relevant file
      # is staged; CI runs it unconditionally as the backstop. Coverage / health
      # numbers are snapshotted, so they ride that backstop rather than this glob.
      glob: '{README.md,apps/marketing/src/i18n.ts,apps/*/package.json,packages/*/package.json,apps/extension/wxt.config.ts,apps/extension/src/**,packages/settings/src/index.ts,LICENSE}'
      run: pnpm check:readme
    suppressions:
      # Keep `// fallow-ignore-*` comments scoped, justified, and budgeted
      # (scripts/check-suppressions.mts). Gated to source edits; the guard scans
      # the whole tree, so any staged code change re-checks the global budget.
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs,astro}'
      run: pnpm check:suppressions
pre-push:
  # `piped: true` runs commands in declaration order and stops at the first
  # failure. Build before e2e: build failures surface fast (≈ seconds) vs
  # the headed-Chromium tax of e2e, and there's nothing to e2e against if
  # the build doesn't produce an artifact.
  piped: true
  commands:
    build:
      # The build is `nx run-many -t build` (invoked directly so `--parallel`
      # lands as an nx flag, not forwarded into the executor). Nx caches by
      # input hash, so untouched projects skip — only changed rebuild. The
      # extension build runs `wxt build` for chrome + firefox + safari and
      # trips the manifest guard in `apps/extension/wxt.config.ts`
      # (`assertBackgroundModuleType`) if the emitted manifest is missing
      # `background.type === 'module'`. Catches that and other build-only
      # regressions before CI sees them.
      #
      # The build's real peak is ~600 MB, but Node's default old-space ceiling
      # is ~4 GB: on a RAM-starved push (e.g. `pnpm dev` + VMs resident) V8
      # grows toward that ceiling and thrashes on GC for minutes before an OOM
      # abort instead of staying lean. Cap the heap so it GCs early and stays
      # bounded, and `--parallel=1` so peak = one project build, not several
      # concurrent. Under genuine RAM exhaustion this fails fast with a clear
      # error rather than grinding ~150 s to a heap-limit crash.
      #
      # `--exclude=diagnostics`: the diagnostics app is a maintainer-only dev
      # extension that never ships to any store and is never built in CI, so it
      # has nothing shippable to gate here. WXT forces MV3 on every target, so
      # its three near-identical bundles tripled its build cost for zero
      # coverage gain — and that ~470 MB working set, run per-target, is a prime
      # contributor to the OOM above. Nothing depends on diagnostics, so the
      # exclusion is clean (it isn't pulled back in as a `^build` dep). It still
      # builds on demand (`pnpm build`, `nx build diagnostics`, `build:chrome`);
      # it just no longer gates pushes.
      env:
        NODE_OPTIONS: '--max-old-space-size=2048'
      run: pnpm exec nx run-many -t build --parallel=1 --exclude=diagnostics
    metrics:
      # Mirrors the CI metrics job: fails if the branch introduces dead code,
      # complexity, or duplication regressions vs origin/main.
      run: pnpm metrics:audit
    e2e-fast:
      # Behavior + structural offline e2e — popup.spec, popup.behavior.spec,
      # options.spec, options.behavior.spec. Excludes the visual specs
      # (cross-platform baseline drift; Linux baselines are authoritative
      # on CI) and the content-script spec (already covered well by unit
      # + the CI offline job). Gated by a glob so docs-only / marketing
      # pushes don't pay the headed-Chromium tax.
      glob: '{apps/extension,apps/e2e,packages/{shared,rules,lang-detect,ui}}/**/*'
      run: pnpm test:e2e:fast
commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
