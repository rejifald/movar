pre-commit:
  parallel: false
  commands:
    prettier:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs,json,md,yml,yaml,css,html}'
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs}'
      run: pnpm lint
    typecheck:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs,astro,json}'
      run: pnpm typecheck
    test:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs}'
      run: pnpm test
pre-push:
  # `piped: true` runs commands in declaration order and stops at the first
  # failure. Build before e2e: build failures surface fast (≈ seconds) vs
  # the headed-Chromium tax of e2e, and there's nothing to e2e against if
  # the build doesn't produce an artifact.
  piped: true
  commands:
    build:
      # `pnpm build` is `nx run-many -t build`. Nx caches by input hash, so
      # untouched projects skip — only changed projects rebuild. The
      # extension build runs `wxt build` for chrome + firefox + safari and
      # trips the manifest guard in `apps/extension/wxt.config.ts`
      # (`assertBackgroundModuleType`) if the emitted manifest is missing
      # `background.type === 'module'`. Catches that and other build-only
      # regressions before CI sees them.
      run: pnpm build
    metrics:
      # Mirrors the CI metrics job: fails if the branch introduces dead code,
      # complexity, or duplication regressions vs origin/main.
      run: pnpm metrics:audit
    e2e-fast:
      # Behavior + structural offline e2e — popup.spec, popup.behavior.spec,
      # options.spec, options.behavior.spec. Excludes the visual specs
      # (cross-platform baseline drift; Linux baselines are authoritative
      # on CI) and the content-script spec (already covered well by unit
      # + the CI offline job). Gated by a glob so docs-only / marketing
      # pushes don't pay the headed-Chromium tax.
      glob: '{apps/extension,apps/e2e,packages/{shared,rules,lang-detect,ui}}/**/*'
      run: pnpm test:e2e:fast
commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
