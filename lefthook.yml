pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{js,ts,tsx,jsx,json,css,md,yml,yaml}'
      run: pnpm prettier --write {staged_files} && git add {staged_files}
    lint:
      glob: '*.{js,ts,tsx,jsx}'
      run: pnpm eslint {staged_files}
commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
