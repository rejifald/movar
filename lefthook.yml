pre-commit:
  parallel: false
  commands:
    prettier:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs,json,md,yml,yaml,css,html}'
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs}'
      run: pnpm lint
    typecheck:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs,astro,json}'
      run: pnpm typecheck
    test:
      glob: '*.{js,jsx,ts,tsx,mts,cts,mjs,cjs}'
      run: pnpm test
pre-push:
  commands:
    metrics:
      # Mirrors the CI metrics job: fails if the branch introduces dead code,
      # complexity, or duplication regressions vs origin/main.
      run: pnpm metrics:audit
    e2e-fast:
      # Behavior + structural offline e2e — popup.spec, popup.behavior.spec,
      # options.spec, options.behavior.spec. Excludes the visual specs
      # (cross-platform baseline drift; Linux baselines are authoritative
      # on CI) and the content-script spec (already covered well by unit
      # + the CI offline job). Gated by a glob so docs-only / marketing
      # pushes don't pay the headed-Chromium tax.
      glob: '{apps/extension,apps/e2e,packages/{shared,rules,lang-detect,ui}}/**/*'
      run: pnpm test:e2e:fast
commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
