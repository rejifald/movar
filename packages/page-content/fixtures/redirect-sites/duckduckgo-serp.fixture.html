<!doctype html>
<!--
  DuckDuckGo SERP capture — /?q=… . Trimmed per the corpus README. DDG has NO
  content extractor — the verdict surface is the redirect rule (getRuleForHost
  → duckduckgoRule, a searchParams strategy that sets `kl` region+language on
  ?q=…, no path gate). Real page shape for the redirect surface.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>реле напряжения at DuckDuckGo</title>
  </head>
  <body>
    <form id="search_form_homepage" action="/" method="get">
      <input id="search_form_input" name="q" type="text" value="реле напряжения" />
    </form>
    <div id="links" class="results">
      <article data-testid="result">
        <h2><a href="https://rozetka.com.ua/ru/">Реле напряжения — Rozetka</a></h2>
      </article>
    </div>
  </body>
</html>
