version: '0.5'

# Movar dev stack — one TUI window for the dev servers, with per-process
# enable/disable from the command palette. Launch via `pnpm dev`.
#
# Layout:
#   - `extension-chrome` runs WXT in Chromium dev mode (launches a browser).
#   - `extension-firefox` is the same for Firefox, disabled by default.
#   - `extension-safari` watches `src/` and rebuilds `.output/safari-mv3-dev/`
#     on every change, disabled by default. It also rsyncs each rebuild into
#     the Xcode app's `Shared (Extension)/Resources/`, so with this process
#     enabled a plain Build/Run in Xcode picks up the latest JS — no manual
#     `build:safari` beforehand. Enable it from the process-compose palette
#     while iterating on the app in Xcode. WXT's normal dev server would
#     point popup.html at `http://localhost:3001/...` for HMR, but Safari
#     blocks that under App Transport Security and the popup renders empty
#     — see `scripts/watch-safari-build.mts` for the rationale. To load the
#     extension standalone instead of via the Xcode app, add the output dir
#     once via Safari → Develop → Web Extension Background Content → Add
#     Temporary Extension (requires Develop menu + "Allow Unsigned
#     Extensions" turned on); after a rebuild, use Develop → Web Extension
#     Background Content → Reload to pick up changes. For a signed
#     App-Store-style install, run `pnpm --filter @movar/extension
#     build:safari` and feed `.output/safari-mv3` to `xcrun
#     safari-web-extension-converter` — that's not wired into `pnpm dev`.
#   - `marketing` runs the Astro dev server on :4321.
#   - `storybook` runs the @movar/ui Storybook on :6006.
#   - `marketing-storybook` runs the @movar/marketing Storybook on :6007.

processes:
  extension-chrome:
    namespace: app
    command: pnpm --filter @movar/extension dev
    availability:
      # `always`, not `on_failure`: WXT's web-ext runner ties the dev server's
      # lifetime to the spawned Chromium child (chromium.js:297 in web-ext-run
      # — when the browser closes for any reason, runner.exit() is called and
      # Node drains with exit code 0). That clean exit is by design — it's
      # WXT's "session over, relaunch me for a fresh pre-configured browser"
      # signal. `on_failure` would ignore it and leave the process Completed;
      # `always` lets process-compose honor it and bring the browser back up.
      restart: always
      backoff_seconds: 3

  extension-firefox:
    namespace: app
    command: pnpm --filter @movar/extension dev:firefox
    availability:
      restart: always
      backoff_seconds: 3
    disabled: true

  extension-safari:
    namespace: app
    command: pnpm --filter @movar/extension dev:safari
    availability:
      # WXT's Safari runner just logs "load unpacked manually" and returns —
      # nothing launches a browser, so the dev server stays up like a normal
      # Vite watcher. No browser child to tie our lifetime to: `on_failure`
      # is the right policy (don't restart on a clean Ctrl-C).
      restart: on_failure
      backoff_seconds: 3
    disabled: true

  extension-diagnostics:
    namespace: app
    # The shadow-oracle diagnostics dev extension (`apps/diagnostics`, see
    # docs/diagnostics-devtools-panel.md). Launches its OWN Chromium with the
    # in-page "Movar Diagnostics" FAB + floating panel loaded; it re-runs
    # detection itself (decision 2), so it doesn't need the product extension
    # alongside it. Runs as part of the stack — `pnpm dev` brings it up (a
    # second browser, alongside extension-chrome). To skip it for a session:
    #   process-compose process stop extension-diagnostics -u /tmp/movar-pc.sock
    # (or set `disabled: true` here). Standalone alternative: `nx run
    # diagnostics:build` and load `.output/{chrome-mv3,firefox-mv3,safari-mv3}`.
    command: pnpm --filter @movar/diagnostics dev
    availability:
      # Same web-ext lifecycle as extension-chrome: WXT exits cleanly when the
      # browser closes (its "relaunch me" signal), so `always`.
      restart: always
      backoff_seconds: 3

  marketing:
    namespace: app
    command: pnpm --filter @movar/marketing dev
    readiness_probe:
      exec:
        command: bash -c 'curl -sf http://127.0.0.1:${ASTRO_PORT:-4321}/ >/dev/null'
      initial_delay_seconds: 3
      period_seconds: 3
      timeout_seconds: 3
      failure_threshold: 30
    availability:
      restart: on_failure
      backoff_seconds: 3

  storybook:
    namespace: app
    command: pnpm --filter @movar/ui storybook
    # Storybook's first boot compiles every story file via Vite — slower than
    # WXT/Astro's lazy entry-only build. Give the readiness probe a longer
    # warm-up before it starts polling, and a generous failure budget so a
    # cold install doesn't restart-loop the process.
    readiness_probe:
      exec:
        command: bash -c 'curl -sf http://127.0.0.1:${STORYBOOK_PORT:-6006}/ >/dev/null'
      initial_delay_seconds: 8
      period_seconds: 3
      timeout_seconds: 3
      failure_threshold: 60
    availability:
      restart: on_failure
      backoff_seconds: 3

  marketing-storybook:
    namespace: app
    command: pnpm --filter @movar/marketing storybook
    # Same cold-start cost as the @movar/ui Storybook above — Vite has to
    # compile every story file before the readiness probe can succeed.
    readiness_probe:
      exec:
        command: bash -c 'curl -sf http://127.0.0.1:${MARKETING_STORYBOOK_PORT:-6007}/ >/dev/null'
      initial_delay_seconds: 8
      period_seconds: 3
      timeout_seconds: 3
      failure_threshold: 60
    availability:
      restart: on_failure
      backoff_seconds: 3
